name: Deploy client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: Verify Pages build environment
        run: test -n "$VITE_WORKER_URL"
        env:
          VITE_WORKER_URL: ${{ vars.VITE_WORKER_URL }}
      - run: pnpm build
        env:
          VITE_WORKER_URL: ${{ vars.VITE_WORKER_URL }}
          VITE_INVITATION_ID: ${{ vars.VITE_INVITATION_ID || 'sample-garden' }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist
      - uses: actions/deploy-pages@v4
